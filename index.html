<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Аналітичний Термінал</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .block { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; }
        h2 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; }
        .news-item { border-bottom: 1px dashed #30363d; padding: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

    <h1 style="color: #f0883e;">📊 Мій Аналітичний Термінал</h1>

    <div class="grid">
        <div class="block">
            <h2>Ринок BTC/USDT (Live)</h2>
            <div style="height:450px;">
                <div id="tradingview_chart"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                  "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "H", "timezone": "Europe/Kyiv",
                  "theme": "dark", "style": "1", "locale": "uk", "container_id": "tradingview_chart"
                });
                </script>
            </div>
        </div>

        <div class="block">
            <h2>Технічний аналіз</h2>
            <div style="height:450px;">
                <iframe src="https://ru.widgets.investing.com/live-currency-cross-rates?theme=darkTheme&pairs=1,2,3,4,5,7,8,9,10" width="100%" height="100%" frameborder="0" allowtransparency="true" marginwidth="0" marginheight="0"></iframe>
            </div>
        </div>
    </div>

    <div class="block">
        <h2>Світові фінансові новини (Reuters, Bloomberg, ФРС)</h2>
        <div style="height: 500px;">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                "feedMode": "all_symbols",
                "colorTheme": "dark",
                "isTransparent": false,
                "displayMode": "regular",
                "width": "100%",
                "height": "100%",
                "locale": "uk"
                }
                </script>
            </div>
        </div>
    </div>

</body>
</html>
