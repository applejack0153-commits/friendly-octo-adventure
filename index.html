<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Крипто-Термінал</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .block { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h2 { color: #f3ba2f; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🚀 Мій Аналітичний Термінал</h1>

    <div class="grid">
        <div class="block">
            <h2>Ринок у реальному часі</h2>
            <div style="height:400px;">
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                  "autosize": true,
                  "symbol": "BINANCE:BTCUSDT",
                  "interval": "D",
                  "timezone": "Europe/Kyiv",
                  "theme": "dark",
                  "style": "1",
                  "locale": "uk",
                  "toolbar_bg": "#f1f3f6",
                  "enable_publishing": false,
                  "allow_symbol_change": true,
                  "container_id": "tradingview_1"
                });
                </script>
            </div>
        </div>

        <div class="block">
            <h2>Сигнали (Investing)</h2>
            <p>Тут будуть маркери: Купувати/Продавати</p>
            </div>
    </div>

    <div class="block" style="margin-top:20px;">
        <h2>Останні новини (Bloomberg/Reuters/ФРС)</h2>
        <p><i>Зараз підключаємо стрічку новин...</i></p>
    </div>

</body>
</html>
